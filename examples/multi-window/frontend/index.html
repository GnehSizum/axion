<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi Window</title>
  </head>
  <body>
    <main>
      <h1>Multi Window</h1>
      <p>
        This example uses one frontend entry for three native windows. Each window receives a
        different command capability set from <code>axion.toml</code>.
      </p>
      <p id="bridge-status">Waiting for Axion bridge...</p>
      <p>
        <button id="close-settings" type="button">Close Settings Window</button>
        <button id="close-preview" type="button">Close Preview Window</button>
        <button id="app-exit" type="button">Exit Application</button>
      </p>
      <label>
        <input id="prevent-close" type="checkbox">
        Simulate unsaved changes and prevent close
      </label>
      <pre id="bridge-details">Loading Axion metadata...</pre>
    </main>
    <script src="app.js"></script>
  </body>
</html>
