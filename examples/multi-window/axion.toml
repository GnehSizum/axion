[app]
name = "multi-window"
identifier = "dev.axion.multi-window"
version = "0.1.0"
description = "Axion multi-window capability smoke application"
authors = ["Axion Maintainers"]
homepage = "https://example.dev/multi-window"

[[windows]]
id = "main"
title = "Multi Window"
width = 960
height = 720
resizable = true
visible = true

[[windows]]
id = "settings"
title = "Settings"
width = 520
height = 420
resizable = false
visible = true

[build]
frontend_dist = "frontend"
entry = "frontend/index.html"

[capabilities.main]
commands = ["app.ping", "app.info", "app.echo"]
events = ["app.log"]
protocols = ["axion"]
allowed_navigation_origins = []
allow_remote_navigation = false

[capabilities.settings]
commands = ["window.info"]
events = ["app.log"]
protocols = ["axion"]
allowed_navigation_origins = ["https://docs.example"]
allow_remote_navigation = false
