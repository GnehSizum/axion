[app]
name = "hello-axion"
identifier = "dev.axion.hello"
version = "0.1.0"
description = "Axion single-window smoke application"
authors = ["Axion Maintainers"]
homepage = "https://example.dev/hello-axion"

[window]
id = "main"
title = "Hello Axion"
width = 960
height = 720
resizable = true
visible = true

[dev]
url = "http://127.0.0.1:3000"

[build]
frontend_dist = "frontend"
entry = "frontend/index.html"

[bundle]
icon = "icons/app.icns"

[capabilities.main]
commands = ["app.ping", "app.info", "app.version", "app.echo", "window.info", "fs.write_text", "fs.read_text", "demo.greet"]
events = ["app.log"]
protocols = ["axion"]
allowed_navigation_origins = ["https://docs.example"]
allow_remote_navigation = false
