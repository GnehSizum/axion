[app]
name = "hello-axion"
identifier = "dev.axion.hello"
version = "0.1.0"
description = "Axion single-window smoke application"
authors = ["Axion Maintainers"]
homepage = "https://example.dev/hello-axion"

[window]
id = "main"
title = "Hello Axion"
width = 960
height = 720
resizable = true
visible = true

[dev]
url = "http://127.0.0.1:3000"

[build]
frontend_dist = "frontend"
entry = "frontend/index.html"

[bundle]
icon = "icons/app.icns"

[native.dialog]
backend = "headless"

[native.clipboard]
backend = "memory"

[native.lifecycle]
close_timeout_ms = 3000

[capabilities.main]
profiles = ["app-info", "app-control", "window-control", "clipboard-access", "file-access", "dialog-access", "app-events"]
commands = ["demo.greet"]
allowed_navigation_origins = []
allow_remote_navigation = false
